name: Automatic Versioning

on:
  push:

jobs:
  versioning:
    runs-on: ubuntu-latest
    env:
      ENTERPRISE_REPO: "https://github.com/Kesmarki-Dev/Enterprise.git"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Install Maven
        run: sudo apt-get install -y maven

      - name: Get current version, branch and commit message
        id: vars
        run: |
          cd Phonebook
          echo "VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_ENV
          echo "COMMIT_MESSAGE=${{ github.event.head_commit.message }}" >> $GITHUB_ENV

      - name: Show extracted Maven project version and branch
        run: |
          echo Original version ${{ env.VERSION }}
          echo Currnet branch ${{ github.ref_name }}
          echo Commit message ${{ env.COMMIT_MESSAGE }}

#github.ref_name == 'main' && 
      - name: Increment minor version on main
        if: contains(env.COMMIT_MESSAGE, 'Merge pull request') && (contains(env.COMMIT_MESSAGE, 'hotfix') || contains(env.COMMIT_MESSAGE, 'bugfix'))
        run: |
          IFS='.' read -r major minor patch <<< "${{ env.VERSION }}"
          echo "$major"
          echo "$minor"
          echo "$patch"
          minor=$((minor+1))
          
          IFS='-' read -ra PATCH_PARTS <<< "$patch"
          PATCH_PARTS[0]=0
          for part in "${PATCH_PARTS[@]}"; do
            patch="${i}."
          done

          echo "${PATCH_PARTS[0]}"
          echo "$patch"
          echo "new minor $minor"
