name: Automatic Versioning

on:
  push:

jobs:
  versioning:
    runs-on: ubuntu-latest
    env:
      ENTERPRISE_REPO: "https://github.com/Kesmarki-Dev/Enterprise.git"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Install Maven
        run: sudo apt-get install -y maven

      - name: Get current version, branch and commit message
        id: vars
        run: |
          cd Phonebook
          echo "VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_ENV
          echo "BRANCH=$(mvn -q -Dexec.executable=echo -Dexec.args='${GITHUB_REF##*/}' --non-recursive exec:exec)" >> $GITHUB_ENV
          echo "COMMIT_MESSAGE=${{ github.event.head_commit.message }}" >> $GITHUB_ENV

      - name: Show extracted Maven project version and branch
        run: |
          echo Original version ${{ env.VERSION }}
          echo Currnet branch ${{ env.BRANCH }}
          echo Commit message ${{ env.COMMIT_MESSAGE }}

      - name: Increment minor version on main
        if: "'env.BRANCH' == 'automated-versioning-trial' && contains(env.COMMIT_MESSAGE, 'Merge pull request') && (contains(env.COMMIT_MESSAGE, 'hotfix') || contains(env.COMMIT_MESSAGE, 'bugfix'))"
        run: echo "Is bugfix / hotfix"
